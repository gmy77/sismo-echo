name: Sismo Worker CI

on:
  pull_request:
    paths:
      - "sismo-worker/**"
      - ".github/workflows/sismo-worker-ci.yml"
  push:
    branches:
      - main
    paths:
      - "sismo-worker/**"
      - ".github/workflows/sismo-worker-ci.yml"
  workflow_dispatch:
    inputs:
      deploy:
        description: "Deploy to Cloudflare after tests pass"
        required: true
        type: choice
        options:
          - "false"
          - "true"
        default: "false"

jobs:
  test:
    name: Validate worker
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sismo-worker
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: sismo-worker/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Syntax check
        run: node --check index.js

      - name: Security regression check
        run: node scripts/security-check.mjs

      - name: Wrangler dry run
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy --dry-run

  deploy:
    name: Deploy worker
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.deploy == 'true'
    defaults:
      run:
        working-directory: sismo-worker
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: sismo-worker/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Deploy to Cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy
